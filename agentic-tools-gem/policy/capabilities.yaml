tools:
  gem.list_projects:
    read_write: read
    allowed_entities: [project]
    integration: gem
    approval_mode: none
    risk_tier: low
    limits:
      rate_per_minute: 30
      batch_size: 100
      concurrency: 3
    forbidden_actions: []
    required_audit_fields: [run_id, step_id, tool_id]

  gem.list_project_candidates:
    read_write: read
    allowed_entities: [project, candidate]
    integration: gem
    approval_mode: none
    risk_tier: low
    limits:
      rate_per_minute: 20
      batch_size: 100
      concurrency: 2
    forbidden_actions: []
    required_audit_fields: [run_id, step_id, tool_id]

  gem.get_candidate:
    read_write: read
    allowed_entities: [candidate]
    integration: gem
    approval_mode: none
    risk_tier: low
    limits:
      rate_per_minute: 30
      batch_size: 20
      concurrency: 3
    forbidden_actions: []
    required_audit_fields: [run_id, step_id, tool_id]

  gem.create_project:
    read_write: write
    allowed_entities: [project]
    integration: gem
    approval_mode: checkpoint
    risk_tier: low
    limits:
      rate_per_minute: 15
      batch_size: 20
      concurrency: 2
    forbidden_actions: []
    required_audit_fields: [run_id, step_id, tool_id, idempotency_key]

  gem.add_profiles_to_project:
    read_write: write
    allowed_entities: [candidate, project]
    integration: gem
    approval_mode: checkpoint
    risk_tier: low
    limits:
      rate_per_minute: 20
      batch_size: 50
      concurrency: 2
    forbidden_actions: []
    required_audit_fields: [run_id, step_id, tool_id, idempotency_key]

  gem.add_candidate_note:
    read_write: write
    allowed_entities: [candidate, note]
    integration: gem
    approval_mode: checkpoint
    risk_tier: high
    limits:
      rate_per_minute: 20
      batch_size: 50
      concurrency: 2
    forbidden_actions: []
    required_audit_fields: [run_id, step_id, tool_id, idempotency_key]

  gem.set_custom_value:
    read_write: write
    allowed_entities: [candidate, custom_value]
    integration: gem
    approval_mode: checkpoint
    risk_tier: high
    limits:
      rate_per_minute: 20
      batch_size: 50
      concurrency: 2
    forbidden_actions: []
    required_audit_fields: [run_id, step_id, tool_id, idempotency_key]
